name: Playwright Tests Project

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Front End (docker-compose up)
      run: |
        docker compose -f ./src/docker-compose.yml up -d

    - name: Wait for web app to be ready
      run: |
        echo "Waiting for http://localhost:3000 to be ready..."
        for i in {1..60}; do
          if curl -sSf --max-time 2 http://localhost:3000 >/dev/null; then
            echo "Service is up"
            exit 0
          fi
          sleep 1
        done
        echo "Timed out waiting for service" >&2
        exit 1

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      id: run-tests
      run: npm test
      env:
        CI: true
        HEADLESS: true

    - name: Upload Playwright report if tests fail
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - name: Tear down Front End (docker-compose down)
      if: always()
      run: |
        docker compose -f ./src/docker-compose.yml down --volumes --remove-orphans